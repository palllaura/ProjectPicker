<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Project Assignment Form</title>
    <style>
        div {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<main>
    <h1>Project Assignment Form</h1>

    <p>Complete your profile to get assigned to internal projects.</p>

    <form id="assignment-form">

        <div>
            <label for="name">Full Name:</label>
            <input id="name" name="name" type="text" required autocomplete="name">
        </div>

        <div>
            <label for="email">Email Address:</label>
            <input id="email" name="email" type="email" required autocomplete="email">
        </div>

        <div>
            <label for="experience">Experience Level:</label>
            <select id="experience" name="experience_level" required>
                <option value="" disabled selected>Select your level</option>
                <option value="Junior (0-2 years)">Junior (0-2 years)</option>
                <option value="Mid-level (2-5 years)">Mid-level (2-5 years)</option>
                <option value="Senior (5+ years)">Senior (5+ years)</option>
            </select>
        </div>

        <div>
            <label for="stack">Primary Technology Stack:</label>
            <select id="stack" name="primary_stack" required>
                <option value="" disabled selected>Choose one</option>
                <option value="Backend Development">Backend Development</option>
                <option value="Frontend Development">Frontend Development</option>
                <option value="Full-Stack Development">Full-Stack Development</option>
                <option value="Data Engineering">Data Engineering</option>
                <option value="DevOps">DevOps</option>
                <option value="Mobile Development">Mobile Development</option>
            </select>
        </div>

        <div>
            <label for="projects">Available Projects:</label>
            <select id="projects" name="projects" multiple size="8" required>
            </select>
        </div>

        <div>
            <fieldset>
                <legend>Preferred Project Duration:</legend>

                <label>
                    <input type="radio" name="preferred_duration" value="Short-term (1-3 months)" required>
                    Short-term (1-3 months)
                </label>

                <label>
                    <input type="radio" name="preferred_duration" value="Medium-term (3-6 months)">
                    Medium-term (3-6 months)
                </label>

                <label>
                    <input type="radio" name="preferred_duration" value="Long-term (6+ months)">
                    Long-term (6+ months)
                </label>

            </fieldset>
        </div>

        <div>
            <label for="skills">Additional Skills (optional):</label>
            <input id="skills" name="skills" type="text" placeholder="e.g., Python, Docker, React">
        </div>

        <div>
            <label>
                <input type="checkbox" id="availability" name="availability_confirmed" required>
                I confirm my availability for the selected projects
            </label>
        </div>

        <div>
            <button type="submit">Save Profile</button>
            <button type="reset">Clear Form</button>
        </div>

    </form>
</main>

<script src="/frontend/script.js" defer></script>

</body>
</html>
